<title>육십갑자</title>
<style>
/* D2Coding 웹폰트 — jsdelivr CDN (Joungkyun/font-d2coding v1.3.2) */
@font-face {
  font-family: 'D2Coding';
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: local('D2Coding'),
       url('https://cdn.jsdelivr.net/gh/Joungkyun/font-d2coding@1.3.2/D2Coding.woff2') format('woff2'),
       url('https://cdn.jsdelivr.net/gh/Joungkyun/font-d2coding@1.3.2/D2Coding.woff')  format('woff');
}
@font-face {
  font-family: 'D2Coding';
  font-style: normal;
  font-weight: 700;
  font-display: swap;
  src: local('D2Coding Bold'),
       url('https://cdn.jsdelivr.net/gh/Joungkyun/font-d2coding@1.3.2/D2CodingBold.woff2') format('woff2'),
       url('https://cdn.jsdelivr.net/gh/Joungkyun/font-d2coding@1.3.2/D2CodingBold.woff')  format('woff');

<style>
/* =============================================
   ★ 테마 색상 변수 — 여기 한 곳에서 모든 색상 관리
   테마 변경 시 이 블록만 수정하면 전체 반영됩니다
============================================= */
:root {

  /* ----------------------------------------
     버전
  ---------------------------------------- */
  --version:              "v1.0.3"; /* 버전 넘버 */
  --version-opacity:      0.3;      /* G3C4 버전 텍스트 투명도 (30%) */
  --g3c1-opacity:         0.3;      /* G3C1 인덱스 숫자 투명도 (30%) */

  /* ----------------------------------------
     body : 페이지 기본 배경
  ---------------------------------------- */
  --body-bg:              #ffffff;  /* 페이지 전체 배경색 (브라우저 기본 흰색 명시) */
  --body-color:           #000000;  /* 페이지 전체 기본 텍스트색 */

  /* ----------------------------------------
     레이아웃 기본 단위 (셀 크기 기준)
  ---------------------------------------- */
  --container-width:       480px;   /* 전체 컨테이너 폭 */
  --cell-unit:             48px;    /* 셀 1칸 기본 폭 (480px ÷ 10) */
  --cell-2:   calc(var(--cell-unit) * 2);  /* 2칸 */
  --cell-3:   calc(var(--cell-unit) * 3);  /* 3칸 */
  --cell-4:   calc(var(--cell-unit) * 4);  /* 4칸 */
  --cell-5:   calc(var(--cell-unit) * 5);  /* 5칸 */
  --g1-bg:                #ffffff;  /* G1 배경색 */
  --g1-color:             var(--color-text-navy);       /* G1 기본 텍스트색 (#333333) */
  --g1-color-inactive:    var(--color-text-gray-light); /* G1 비활성 토글 텍스트색 (#aaaaaa) */
  --g1-font-size:         11px;     /* G1 전체 폰트 크기 */
  --color-text-gray-light:#aaaaaa;  /* G1 비활성 토글 텍스트 */
  --color-text-navy:      #333333;  /* G1 활성 텍스트 / 툴팁 텍스트 */

  /* ----------------------------------------
     G2 : 왕조 드롭다운
  ---------------------------------------- */
  --g2-bg:                #ffffff;  /* G2 드롭다운 셀 배경색 */
  --g2-font-family:        'D2Coding', "Malgun Gothic", "맑은 고딕", monospace; /* G2 폰트 */
  --g2-list-width:         0px;     /* G2 드롭다운 목록 너비 공통 기본값 (0 = 셀 폭 자동) */
  --g2-list1-width:        calc(var(--cell-5) + 0px); /* G2 첫번째 (중국 왕조) 목록 너비 — + Npx 로 조정 */
  --g2-list2-width:        calc(var(--cell-5) + 25px); /* G2 두번째 (한국 왕조) 목록 너비 — + Npx 로 조정 */

  /* G2 재위기간 60년 이상 표시
     샘플: ◆(다이아몬드) ★(별) ●(동그라미) ▲(삼각형) ■(사각형) ♦(작은다이아) ✦(별2) */
  --g2-scrollbar-thumb:    #B0B0B0;  /* G2 스크롤바 썸(막대) 색상 */
  --g2-scrollbar-track:    #E8E8E8;  /* G2 스크롤바 트랙(배경) 색상 — 썸보다 4단계 연함 */
  --g2-over60-color:       #FF0000; /* 60년 이상 왕 한자명 괄호 색상 */
  --g2-over60-hover-color: #0000FF; /* 60년 이상 왕 호버 시 괄호 색상 */
  --g2-font-size:          18px;    /* G2 드롭다운 기본 폰트 (선택된 항목 표시) */
  --g2-arrow-font-size:    30px;    /* G2 드롭다운 화살표(▼▲) 폰트 크기 */
  --g2-title-font-size:    14px;    /* G2 목록 상단 타이틀 폰트 크기 */
  --g2-option-font-size:   18px;    /* G2 목록 항목 폰트 크기 */
  --g2-option-font-family: "Malgun Gothic", "맑은 고딕", sans-serif; /* G2 목록 항목 폰트 */
  --g2-option-id-font-size: 8px;    /* G2 목록 항목 id(明01 등) 폰트 크기 */
  --g2-selected-align:     center;  /* G2 선택된 항목 표시 정렬 */
  --g2-title-align:        center;  /* G2 목록 타이틀 정렬 */
  --g2-option-align:       right;   /* G2 목록 항목 정렬 */
  --color-bg-page:        #ffffff;  /* 드롭다운 배경 (흰색) */
  --color-bg-yellow:      #FFFF9B;  /* 드롭다운 선택항목/레이블 배경 */
  --color-text-red-dark:  #cc0000;  /* G2 드롭다운 hover 텍스트 */
  --color-border-light:   #cccccc;  /* G2 드롭다운 테두리 */
  --color-border-red:     #ff0000;  /* G2 드롭다운 hover 테두리 */
  --color-text-gray-mid:  #666666;  /* G2 화살표 / 설정메뉴 레이블 */

  /* ----------------------------------------
     G3 : 갑자 년도 행
  ---------------------------------------- */
  --g3-bg:                #ffffff;  /* G3 배경색 */
  --g3-font-family:            'D2Coding', "Malgun Gothic", "맑은 고딕", monospace; /* G3 폰트 */
  --g3-font-size:              14px;  /* G3 폰트 크기 */
  --g3-line-height:            1;     /* G3 줄 높이 (수직 중앙 정렬용) */
  --g3-padding-top:            2px;   /* G3 전체 기본 수직 보정값 */
  --g3c1-padding-top:          2px;   /* G3C1 간지 인덱스 (-/숫자) 개별 보정값 */
  --g3c4-padding-top:          2px;   /* G3C4 서기 연도 숫자 개별 보정값 */
  --g3c5-padding-top:          2px;   /* G3C5 왕조 표시 (2칸) 개별 보정값 */
  --g3c6-padding-top:          2px;   /* G3C6 왕조 한자 개별 보정값 */
  --g3c7-padding-top:          2px;   /* G3C7 왕조 시작 연도 개별 보정값 */
  --g3c8-padding-top:          2px;   /* G3C8 왕조 끝 연도 개별 보정값 */
  --g3c9-padding-top:          2px;   /* G3C9 치세 년수 개별 보정값 */
  --g3-yearinput-font-size:    14px;  /* G3 yearInput 폰트 크기 */
  --g3-yearinput-font-family:  'D2Coding', "Malgun Gothic", "맑은 고딕", monospace; /* G3 yearInput 폰트 */
  --g3-yearinput-font-weight:  normal;  /* G3 yearInput 폰트 굵기 */
  --g3-yearinput-dot-color:    rgba(180,180,180,0.8); /* G3 yearInput 도트 색상 */
  --g3-yearinput-dot-size:     0.5px; /* G3 yearInput 도트 크기 */
  --g3-yearinput-dot-gap:      2px;   /* G3 yearInput 도트 간격 */
  --g3-yearbtn-font-size:      16px;  /* G3 yearInput ◀▶ 버튼 폰트 크기 */
  --color-text-red:       #FF0000;  /* G3 BC연도/C1/C4 빨강 / G6 선택 셀 폰트 / G4 음수 연도 */

  /* ----------------------------------------
     G4 : 간지 연도 셀
  ---------------------------------------- */
  --g4-font-size:         17px;     /* G4 폰트 크기 */
  --g4-font-family:       'D2Coding', monospace; /* G4 폰트 */
  --g4-bg:                #FFFF9B;  /* G4 기본 배경색 */
  --color-bg-yellow-dark: #FFCC00;  /* G4 강조 배경 / G6 선택 셀 배경 / 설정메뉴 버튼 활성 배경 */
  --color-bg-black:       #000000;  /* G4 조건부 강조 배경 (흑) */
  --color-text-white:     #ffffff;  /* G4 강조 셀 반전 텍스트 (흰색) */
  --color-text-default:   #000000;  /* G4/G3 기본 텍스트 (흑) */

  /* ----------------------------------------
     G5 : 단군 연도 행
  ---------------------------------------- */
  --g5-bg:                #ffffff;  /* G5 배경색 (명시적 흰색) */
  --g5-font-size:         12px;     /* G5 폰트 크기 */

  /* ----------------------------------------
     G6 : 육십갑자 그리드
  ---------------------------------------- */
  --g6-bg:                #ffffff;  /* G6 셀 기본 배경색 */
  --g6-cell-height:       81px;     /* G6 셀 높이 (topBox 27 + hanjaBox 27 + korBox 27) = 81px × 6행 = 486px */
  --g6-font-size:         18px;     /* G6 한자/한글 폰트 크기 */
  --g6-selected-bg:       var(--color-bg-yellow-dark); /* G6 선택 셀 배경색    → --color-bg-yellow-dark */
  --g6-selected-color:    var(--color-text-red);       /* G6 선택 셀 폰트색    → --color-text-red */
  --g6-selected-weight:   bold;                        /* G6 선택 셀 폰트 굵기 */
  --g6-range-bg:          #FFFF9B;  /* G6 왕조 범위 배경색 (독립값) */
  --g6-startcell-highlight: 0,#FF0000; /* G6 시작점 텍스트 강조 — 0:OFF / 1:ON, 뒤의 색상값 적용 */
  --color-bg-yellow-pale: #fffde7;  /* G6 hover 크림 배경 / G7 포커스 배경 */
  --color-bg-badge:       rgba(255,255,0,0.6); /* G6bg 숫자 배지 배경 */
  --color-bg-transparent: transparent; /* G6bg 배지 초기화 투명 */
  --color-text-red-copy:  #cc2200;  /* G6 복사 hover 텍스트 */

  /* ----------------------------------------
     G7 : 연도 계산 행
  ---------------------------------------- */
  --g7-bg:                #ffffff;  /* G7 셀 기본 배경색 */
  --g7-box-color:         var(--g7-color-readonly); /* G7 box 기본 텍스트색 → 읽기전용 회색 */
  --g7-font-size:         16px;     /* G7 box 폰트 크기 */
  --g7-font-family:       'D2Coding', monospace; /* G7 폰트 */
  --g7-font-weight:       bold;     /* G7 box 폰트 굵기 */
  --g7-label-font-size:   11px;     /* G7 label 폰트 크기 */
  --g7-label-font-size:   11px;     /* G7 label 폰트 크기 */
  --g7-label-bg:          #FFFF9B;  /* G7 레이블 셀 배경색 */
  --g7-c9-bg:             #FFFF9B;  /* G7 R1C9, R2C9 배경색 */
  --g7-focus-bg:          #fffde7;  /* G7 입력 셀 포커스 배경색 */
  --g7-color-input:       var(--color-text-blue);     /* G7 입력 가능 셀 */
  --g7-color-readonly:    var(--color-text-gray-mid); /* G7 입력 불가 셀 */
  --g7-color-clip:        var(--color-text-green);    /* G7 클립 복사 셀 */
  --g7-color-label:       var(--color-text-green);    /* G7 레이블 셀 */
  --color-text-green:     #1a6e1a;  /* G7 클립/레이블 초록 */
  --color-text-blue:      #003399;  /* G7 입력 가능 셀 파랑 */

  /* ----------------------------------------
     공통 테두리
  ---------------------------------------- */
  --color-border-default: #444444;  /* 기본 셀 테두리 */
  --color-border-dark:    #333333;  /* 진한 테두리 (G6 셀, G7) */
  --color-border-menu:    #888888;  /* 설정메뉴 테두리 */
  --color-border-transp:  transparent; /* 투명 테두리 */
  --g6-col-border:        0.5px solid #333333; /* G6 셀 내부 세로 라인 (G4와 동일 두께) */

  /* ----------------------------------------
     공통 기타
  ---------------------------------------- */
  --color-bg-btn:         #f0f0f0;  /* 설정메뉴 버튼 비활성 배경 */
  --color-text-gray-dark: #444444;  /* 진회색 (공통 테두리와 동일) */

  /* ----------------------------------------
     명시적 기본 텍스트 색상 (미지정 시 검정)
  ---------------------------------------- */
  --box-color:            #000000;  /* .box 기본 텍스트색 */
  --box-font-size:        16px;     /* .box 기본 폰트 크기 */
  --g2-color:             #000000;  /* G2 드롭다운 기본 텍스트색 */
  --g2-arrow-color:       #666666;  /* G2 화살표(▼▲) 색상 */
  --g2-option-color:      #000000;  /* G2 목록 항목 텍스트색 */
  --g5-color:             #000000;  /* G5 단군 연도 텍스트색 */
  --g6-cell-color:        #000000;  /* G6 hanjaBox/korBox 기본 텍스트색 */
  --g6-hanjaline-color:   #DBDCDE;  /* G6 hanjaBox 하단 구분선 색상 */
  --g6-hanjaline-width:   1px;      /* G6 hanjaBox 하단 구분선 두께 */

  /* ----------------------------------------
     G6bg : 치세L2 배지 위치 조정 변수 (상단OFF 전용)
     hanja-num: hanjaBox 기준 top 오프셋
     kor-num  : 경계선 기준 top 오프셋
  ---------------------------------------- */
  --g6bg-l2-hanja-top-offset: 0px;   /* hanja-num 치세L2 top 보정값 (자동계산: -(폰트사이즈/2)-1 적용됨) */
  --g6bg-l2-kor-top-offset:   0px;   /* kor-num   치세L2 top 보정값 */
}

html {
	margin:0; padding:0;
	overflow-x:hidden;
}
body {
	margin:0; padding:0;
	display:flex;
	justify-content:center;
	min-height:100vh;
	overflow-x:hidden;
	background-color: var(--body-bg);
	color: var(--body-color);
	font-family: 'D2Coding', monospace;
}
.container { width:480px; margin:0; padding:0; }
.group { margin-bottom:1px; }
.G2 { margin-bottom:0; }
.G3 { margin-bottom:0; }

/* =============================
   공통 grid
============================= */
.grid10 {
  display: grid;
  grid-template-columns: repeat(10, 1fr); /* 10칸 */
  gap: 0;
  width: 100%;              /* 부모의 폭을 꽉 채움 */
  border: 2px solid var(--color-border-default);
  box-sizing: border-box;   /* G4 기준 폭 통일 */
}

.h05 { height:16px; }
.h1 { height:28px; }
.h15 { height:42px; }
.c1 { grid-column:span 1; }
.c2 { grid-column:span 2; }
.c3 { grid-column:span 3; }
.c5 { grid-column:span 5; }

/* =============================
   box 기본
============================= */
.box {
  border:1px solid var(--color-border-default);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: var(--box-font-size);
  line-height:1;
  padding:0;
  box-sizing:border-box;
  text-align:center;
  color: var(--box-color);
}


.G3 .box {
  border: none;
  border-right: 0.5px solid #DCDCDE; /* G4와 동일 방식 — 우측만 사용 */
  outline: none;
  background-color: var(--g3-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: var(--g3-font-size);
  font-family: var(--g3-font-family);
  line-height: var(--g3-line-height);
  padding-top: var(--g3-padding-top);
  color: var(--color-text-default);
}
/* G3 마지막 셀 오른쪽 border 제거 (외곽선과 중복 방지) */
.G3 .grid10 .box:last-child {
  border-right: none;
}
.G3 .c1 {
  font-size: var(--g3-font-size);
  font-family: var(--g3-font-family);
  line-height: var(--g3-line-height);
}

/* G3C5 (4번째 셀, 2칸) */
.G3 .grid10 .box:nth-child(4) {
  font-size: var(--g3-font-size);
  font-family: var(--g3-font-family);
  line-height: var(--g3-line-height);
}
.G3 .grid10 {
  border: 2px solid var(--color-border-default); /* G4와 동일한 외곽선 2px */
  border-bottom: none; /* G4 상단과 겹침 제거 */
}

/* G3 나머지 셀 검정 */
#G3C4, #G3C6, #G3C7, #G3C8, #G3C9 {
  color: var(--color-text-default) !important;
}

/* G3 셀별 개별 padding-top 보정 */
#G3C1 { padding-top: var(--g3c1-padding-top); opacity: var(--g3c1-opacity); } /* 간지 인덱스 (-/숫자) */
#G3C4 { padding-top: var(--g3c4-padding-top); } /* 서기 연도 숫자 */
#G3C5 { padding-top: var(--g3c5-padding-top); white-space: nowrap; overflow: hidden; font-size: 11px; } /* 왕조 표시 (2칸) — nowrap으로 두 줄 방지 */
#G3C6 { padding-top: var(--g3c6-padding-top); } /* 왕조 한자 */
#G3C7 { padding-top: var(--g3c7-padding-top); } /* 왕조 시작 연도 */
#G3C8 { padding-top: var(--g3c8-padding-top); } /* 왕조 끝 연도 */
#G3C9 { padding-top: var(--g3c9-padding-top); } /* 치세 년수 */

/* G3C7·G3C8·G3C9 두 줄 표시 (충숙왕·충혜왕 전용) */
#G3C7.g3-paired, #G3C8.g3-paired, #G3C9.g3-paired {
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding-top: 0 !important;
  line-height: 1.15;
}
#G3C7.g3-paired span, #G3C8.g3-paired span, #G3C9.g3-paired span {
  font-size: 9px;
  line-height: 1.2;
  display: block;
  text-align: center;
}


/* =============================
   G2 : 왕조 드롭다운
============================= */

  function updateG4Cells(){ if(selectedCellIndex === null) return; let firstVal = parseInt(G4Boxes[0].dataset.year); if(isNaN(firstVal)) return; for(let i=1; i<G4Boxes.length; i++){ let val = firstVal + i*60; if(firstVal < 0 && firstVal + i*60 >= 0) val += 1; G4Boxes[i].dataset.year = val; G4Boxes[i].textContent = Math.abs(val); G4Boxes[i].style.color = val < 0 ? "var(--color-text-red)" : "var(--color-text-default)"; } }

// ===== G6 복사 설정 상태 =====
// bracketOrder: [] 선택 순서 기록, 예) ["()"] or ["[]"] or ["()","[]"] or ["[]","()"]
// 1,2번: clickMode = "hanja"(漢클릭) or "kor"(한클릭) — 연동
// 3,4번: Ctrl=3번(甲子+갑자), Alt=4번(갑자+甲子) — 괄호 적용
const g6CopyState = {
  bracketOrder: [], // 선택된 괄호 순서 배열
  keyModes: ["Ctrl"],   // 다중 선택: "Ctrl", "Alt"
  clickModes: ["漢", "한"], // 다중 선택: "漢", "한" — 최소 하나 필수
};

// 괄호 적용 함수: 뒤쪽 글자에 첫번째 괄호, 전체에 두번째 괄호
function applyBrackets(front, back) {
  const bo = g6CopyState.bracketOrder;
  if (bo.length === 0) return front + back;

  const bMap = { "()": ["(", ")"], "[]": ["[", "]"] };

  if (bo.length === 1) {
    const [o, c] = bMap[bo[0]];
    return front + o + back + c;
  }
  // 2개: 첫번째=안쪽(뒤글자), 두번째=바깥쪽(전체)
  const [io, ic] = bMap[bo[0]]; // 안쪽 괄호
  const [oo, oc] = bMap[bo[1]]; // 바깥쪽 괄호
  return oo + front + io + back + ic + oc;
}

// 복사 텍스트 계산 함수
function getG6CopyText(hanjaText, korText, isOnHanja, isCtrl, isAlt) {
  const km = g6CopyState.keyModes;
  const cm = g6CopyState.clickModes;

  // 선택된 키만 정확히 작동 — 선택 안 된 키가 눌려 있으면 제외
  const ctrlOnly = km.includes("Ctrl") && !km.includes("Alt");
  const altOnly  = km.includes("Alt")  && !km.includes("Ctrl");
  const both     = km.includes("Ctrl") && km.includes("Alt");

  let isKey = false;
  if (both)          isKey = isCtrl && isAlt;
  else if (ctrlOnly) isKey = isCtrl && !isAlt;
  else if (altOnly)  isKey = isAlt  && !isCtrl;

  // 키가 눌렸는데 조합이 맞지 않으면 아무것도 안 함
  const anyKeyPressed = isCtrl || isAlt;
  if (anyKeyPressed && !isKey) return null;

  if (isKey && isOnHanja) {
    return applyBrackets(hanjaText, korText);
  } else if (isKey && !isOnHanja) {
    return applyBrackets(korText, hanjaText);
  } else {
    // 일반 클릭 — clickModes 에 따라 결정
    const hanOn = cm.includes("漢");
    const korOn = cm.includes("한");
    if (hanOn && korOn) {
      return isOnHanja ? hanjaText : korText;
    } else if (hanOn && !korOn) {
      return hanjaText;
    } else {
      return korText;
    }
  }
}

// ===== G6 60갑자 셀 클릭, 클립보드 복사 및 호버 처리 =====
cells.forEach((cell, index) => {
  const hanja = cell.querySelector(".hanjaBox"); // 한자 영역
  const kor = cell.querySelector(".korBox");     // 한글 영역

  // ===== G6 셀 클릭 이벤트 =====
  cell.addEventListener("click", function(event) {

    // ----- 클립보드 복사 준비: 영역 판정 (DOM 업데이트 전에 측정) -----
    const hanjaText = hanja.textContent.trim();
    const korText   = kor.textContent.trim();
    const hanjaRect = hanja.getBoundingClientRect();
    const korRect   = kor.getBoundingClientRect();
    const isOnHanja = event.clientY >= hanjaRect.top && event.clientY < hanjaRect.bottom;
    const isOnKor   = event.clientY >= korRect.top   && event.clientY < korRect.bottom;
    const isOnTop   = !isOnHanja && !isOnKor;

    // G6 복사 텍스트 미리 계산 (클립 ON + 한자/한글 영역 클릭 시)
    let g6CopyText = null;
    if (!isOnTop && window.g6ClipEnabled) {
      g6CopyText = getG6CopyText(hanjaText, korText, isOnHanja, event.ctrlKey, event.altKey);
    }

    // ----- 기존 G6 클릭 처리 유지 -----

    // 1. 모든 셀 초기화: 글자색, 글자 굵기, 배경색
    cells.forEach(c => { 
      const ch = c.querySelector(".hanjaBox");
      const ck = c.querySelector(".korBox");
      if(ch) { ch.style.color = "var(--color-text-default)"; ch.style.fontWeight = "normal"; ch.style.backgroundColor = ""; }
      if(ck) { ck.style.color = "var(--color-text-default)"; ck.style.fontWeight = "normal"; ck.style.backgroundColor = ""; }
    });

    // 2. 선택된 인덱스 및 셀 저장, G4/G5/G3 관련 업데이트
    selectedCellIndex = index;
    selectedCell = cell; // 선택된 셀 직접 저장
    updateG4C1();
    updateG4Cells();
    updateG5Cells();
    updateG3C1();
    updateG3YearColor();

    // 3. 왕조 범위 배경색 적용 (쌍 왕/일반 왕 공통 — applyG6RangeConditionalFormatting 재사용)
    if (typeof applyG6RangeConditionalFormatting === "function") {
      applyG6RangeConditionalFormatting();
    }

    // 4. 클릭한 셀 강조 (폰트 효과, topBox ON이면 한자/한글 영역 밝은 노랑 배경)
    const topOn = window.g6TopBoxEnabled !== false;
    hanja.style.backgroundColor = "#FFFF00";
    kor.style.backgroundColor   = "#FFFF00";
    hanja.style.color = "var(--g6-selected-color)";
    kor.style.color = "var(--g6-selected-color)";
    hanja.style.fontWeight = "var(--g6-selected-weight)";
    kor.style.fontWeight = "var(--g6-selected-weight)";

    // 5. G6bg 숫자 레이어 다시 그리기
    if (typeof updateG6bgIndicators === "function") {
      updateG6bgIndicators();
    }

    // 6. 클립보드 복사 — g4CopyMode 에 따라 분기 (DOM 확정 후)
    if (window.g6ClipEnabled) {
      const g4BlackText = getG4BlackCellsText();
      const mode = window.g4CopyMode || "none";

      if (mode === "none") {
        // G4없음: G6 텍스트만 복사
        if (g6CopyText !== null) {
          navigator.clipboard.writeText(g6CopyText)
            .then(() => console.log(`G6 복사: ${g6CopyText}`))
            .catch(err => console.error("클립보드 복사 실패:", err));
        }

      } else if (mode === "merge") {
        // G6+G4 한 줄: 공백으로 합쳐 1회 복사
        const parts = [g6CopyText, g4BlackText].filter(v => v);
        if (parts.length > 0) {
          const finalText = parts.join(" ");
          navigator.clipboard.writeText(finalText)
            .then(() => console.log(`G6+G4 합산복사: ${finalText}`))
            .catch(err => console.error("클립보드 복사 실패:", err));
        }

      } else if (mode === "split") {
        // 분리: G6 먼저 → delay ms 후 G4

    const copyText = getG6CopyText(hanjaText, korText, isOnHanja, e.ctrlKey, e.altKey);

    const cellIndex = Array.from(cells).indexOf(cell);
    const isLeftHalf = (cellIndex % 10) < 5;

    // 마우스가 한자/한글 영역 중 어디에 있는지에 따라 기준 rect 결정
    const targetRect = isOnHanja ? hanjaRect : korRect2;

    // 툴팁 너비 측정을 위해 일단 표시 (투명하게)
    tooltip.style.visibility = "hidden";
    tooltip.style.display = "flex";
    const tipW = tooltip.offsetWidth;
    const tipH = tooltip.offsetHeight;
    tooltip.style.visibility = "";

    // pinch-to-zoom 보정: visualViewport가 있으면 offset 적용
    const vvLeft   = window.visualViewport ? window.visualViewport.offsetLeft : 0;
    const vvTop    = window.visualViewport ? window.visualViewport.offsetTop  : 0;
    const vvWidth  = window.visualViewport ? window.visualViewport.width      : window.innerWidth;
    const vvHeight = window.visualViewport ? window.visualViewport.height     : window.innerHeight;

    // 수직: 기준 영역 상단에 맞춤 (visualViewport 보정)
    let top  = targetRect.top  + vvTop;
    let left;

    // 수평: 왼쪽 절반이면 오른쪽, 오른쪽 절반이면 왼쪽 (visualViewport 보정)
    if (isLeftHalf) {
      left = targetRect.right + vvLeft + 2;
    } else {
      left = targetRect.left  + vvLeft - tipW - 2;
    }

    // 화면 밖으로 나가는 경우 보정 (visualViewport 기준)
    if (left < vvLeft)                    left = targetRect.right + vvLeft + 2;
    if (left + tipW > vvLeft + vvWidth)   left = targetRect.left  + vvLeft - tipW - 2;
    if (top + tipH  > vvTop  + vvHeight)  top  = vvTop + vvHeight - tipH - 4;
    if (top < vvTop)                      top  = vvTop;

    tooltip.style.left = left + "px";
    tooltip.style.top  = top  + "px";
    tooltip.style.display = "flex";
  }

  function showYearDropdown() {
    const existing = document.getElementById("yearDropList");
    if (existing) { existing.remove(); return; }

    const ITEM_H  = 26;   // 아이템 높이
    const VISIBLE = 11;   // 보이는 항목 수
    const STEP    = 60;   // 60년 단위
    // 목록 기준: 1444 기준으로 미래 5개 + 과거 전체 (총 ~55개)
    const BASE    = 1444; // G3C2 기본 표시값
    const FUTURE  = 5;    // 기준보다 미래 방향 항목 수

    // ── 아이템 배열: BASE 기준 미래 FUTURE개 ~ 과거 끝(-999)까지
    const baseAstro = toAstronomicalYear(closestGapjaYear(BASE));
    const years = [];
    // 미래쪽 (위에 표시)
    for (let i = FUTURE; i >= 1; i--) {
      const y = fromAstronomicalYear(baseAstro + i * STEP);
      if (y <= 2025) years.push(y);
    }
    // BASE 포함 과거쪽
    for (let i = 0; ; i++) {
      const y = fromAstronomicalYear(baseAstro - i * STEP);
      if (y < -999) break;
      years.push(y);
    }
    // BASE(1444)의 인덱스
    const baseIdx = years.findIndex(y => y === closestGapjaYear(BASE));

    // ── 외부 컨테이너 (overflow-y: auto → 네이티브 스크롤)
    const list = document.createElement("div");
    list.id = "yearDropList";
    const rect = yearDropdown.getBoundingClientRect();

    // pinch-to-zoom 보정: visualViewport offset 적용
    const vv       = window.visualViewport;
    const vvLeft   = vv ? vv.offsetLeft  : 0;
    const vvTop    = vv ? vv.offsetTop   : 0;
    const vvWidth  = vv ? vv.width       : window.innerWidth;
    const vvHeight = vv ? vv.height      : window.innerHeight;

    const listW  = Math.max(rect.width, 80);
    const listH  = ITEM_H * VISIBLE;

    // 기본 위치: 드롭다운 바로 아래 (getBoundingClientRect는 이미 viewport 기준이므로 zoom시에만 offset 가산)
    const scale  = vv ? (vv.scale || 1) : 1;
    let listLeft = rect.left + (scale > 1.01 ? vvLeft : 0);
    let listTop  = rect.bottom + (scale > 1.01 ? vvTop : 0);

    // 화면 밖으로 나가는 경우 보정
    if (listLeft + listW > vvWidth)   listLeft = vvWidth - listW - 4;
    if (listLeft < 0)                 listLeft = 0;
    if (listTop  + listH > vvHeight)  listTop  = rect.top + (scale > 1.01 ? vvTop : 0) - listH; // 위로 펼치기
    if (listTop  < 0)                 listTop  = 0;

    list.style.cssText = [
      "position:fixed",
      `left:${listLeft}px`,
      `top:${listTop}px`,
      `width:${listW}px`,
      `height:${listH}px`,
      "overflow-y:auto",
      "-webkit-overflow-scrolling:touch",

      item.style.cssText = [
        `height:${ITEM_H}px`,

      let tStartY = 0;
      item.addEventListener("touchstart", function(e) {

  // ===== G2 커스텀 드롭다운 =====
  // 두 년도 범위의 겹침 계산
  function overlapYears(s1, e1, s2, e2) {
    const start = Math.max(s1, s2);
    const end   = Math.min(e1, e2);
    return Math.max(0, end - start + 1);
  }

  // 반대쪽 드롭다운에서 가장 많이 겹치는 항목 자동 선택
  function syncOtherDropdown(selectedItem, otherDataList, otherDropdownId, otherSelectedId, otherListId) {
    let bestItem = null;
    let bestOverlap = 0;
    otherDataList.forEach(item => {
      const ov = overlapYears(selectedItem.start, selectedItem.end, item.start, item.end);
      if (ov > bestOverlap) { bestOverlap = ov; bestItem = item; }
    });
    if (!bestItem) return;

    // 표시 업데이트
    const otherSelected = document.getElementById(otherSelectedId);
    if (otherSelected) otherSelected.textContent = `${bestItem.era}`;

    // 선택 표시
    const otherList = document.getElementById(otherListId);
    if (otherList) {
      otherList.querySelectorAll(".g2-option").forEach(o => {
        o.classList.toggle("selected", o.dataset.id === bestItem.id);
      });
    }
  }

  function buildG2Dropdown(dropdownId, selectedId, listId, dataList, otherDataList, otherDropdownId, otherSelectedId, otherListId) {
    const dropdown = document.getElementById(dropdownId);
    const selected = document.getElementById(selectedId);
    const list     = document.getElementById(listId);

    // 항목 생성
    // CSS 변수에서 기호와 색상 읽기
    const rootStyle   = getComputedStyle(document.documentElement);
    const markerChar  = rootStyle.getPropertyValue("--g2-over60-marker").trim().replace(/['"]/g, "") || "◆";
    const markerColor = rootStyle.getPropertyValue("--g2-over60-color").trim() || "#FF0000";

    dataList.forEach(item => {
      const opt = document.createElement("div");
      opt.className = "g2-option";
      opt.dataset.id = item.id;
      // 재위기간 60년 이상이면 괄호와 한자를 빨강색으로 표시
      const reign = item.end - item.start;
      const eraDisplay = reign >= 60
        ? item.era.replace(/\(([^)]+)\)/, `<span class="over60-paren" style="color:${markerColor};">(</span><span class="over60-hanja" style="color:${markerColor};">$1</span><span class="over60-paren" style="color:${markerColor};">)</span>`)
        : item.era;
      // 쌍 왕도 목록에서는 원본 형식 그대로 표시 (item.start-item.end)
      opt.innerHTML = `<span style="font-size:var(--g2-option-id-font-size); vertical-align:middle;">${item.id}</span> ${eraDisplay} ${item.start}-${item.end}`;

      // 60년 이상 — 호버 시 괄호+한자 색상 변경 (인라인 스타일 직접 제어)
      if (reign >= 60) {
        const hoverColor = rootStyle.getPropertyValue("--g2-over60-hover-color").trim() || "#0000FF";
        opt.addEventListener("mouseenter", () => {
          opt.querySelectorAll(".over60-paren, .over60-hanja").forEach(s => s.style.color = hoverColor);
        });
        opt.addEventListener("mouseleave", () => {
          opt.querySelectorAll(".over60-paren, .over60-hanja").forEach(s => s.style.color = markerColor);
        });
      }

      opt.addEventListener("mousedown", (e) => {
        e.preventDefault();
        list.querySelectorAll(".g2-option").forEach(o => o.classList.remove("selected"));
        opt.classList.add("selected");
        // 쌍 왕은 선택 표시에서 숫자 제거 (충숙왕1 → 충숙왕)
        selected.textContent = item.paired
          ? item.era.replace(/([가-힣]+)\d+/, "$1")
          : item.era;
        dropdown.classList.remove("open");
        onG2Select(item);
        // 반대쪽 드롭다운 자동 연동
        syncOtherDropdown(item, otherDataList, otherDropdownId, otherSelectedId, otherListId);
      });
      list.appendChild(opt);
    });

    // 열기/닫기
    selected.addEventListener("mousedown", (e) => {
      e.stopPropagation();
      const isOpen = dropdown.classList.contains("open");
      document.querySelectorAll(".g2-dropdown.open").forEach(d => d.classList.remove("open"));
      if (!isOpen) {
        dropdown.classList.add("open");
      }
    });

    // 외부 클릭 시 닫기
    document.addEventListener("mousedown", (e) => {
      if (!dropdown.contains(e.target)) {
        dropdown.classList.remove("open");
      }
    });
  }

  // G2 선택 시 G6 선택 셀 스타일 복원 함수
  function restoreSelectedCell() {
    if (!selectedCell) return;
    const h = selectedCell.querySelector(".hanjaBox");

    if(h) { h.style.color = "var(--g6-selected-color)"; h.style.fontWeight = "var(--g6-selected-weight)"; }

  // ── G3C5 폰트 크기 자동 조정 ──
  // 한글 2자 + 한자 2자 (= 텍스트가 "XX(XX)" 6자) 일 때 → G3 기본 폰트 크기
  // 그 외 (더 긴 왕명) → 11px 고정
  function adjustG3C5FontSize(text) {
    const kor   = (text.match(/[가-힣]/g)  || []).length;
    const hanja = (text.match(/[\u4E00-\u9FFF]/g) || []).length;
    G3C5.style.fontSize = (kor === 2 && hanja === 2)
      ? "var(--g3-font-size)"
      : "11px";
  }

  function onG2Select(item) {
    if (item.paired) {
      // ── 쌍 왕 (충숙왕 / 충혜왕) ──
      // G3C5: 숫자 제거 (충숙왕1→충숙왕, 忠肅王 유지)
      const eraNoNum = item.era.replace(/([가-힣]+)\d+/, "$1");
      G3C5.textContent = eraNoNum;
      adjustG3C5FontSize(eraNoNum);
      // G3C6: 한자만 (숫자·한글·괄호 제거)
      G3C6.textContent = eraNoNum.replace(/[가-힣()]/g, "");

      // 두 치세 정렬 (작은 start가 위)
      const t1 = item.pairIdx === 1
        ? { start: item.start, end: item.end }
        : { start: item.pairOther.start, end: item.pairOther.end };
      const t2 = item.pairIdx === 1
        ? { start: item.pairOther.start, end: item.pairOther.end }
        : { start: item.start, end: item.end };

      // G3C7: 두 시작연도 두 줄
      G3C7.classList.add("g3-paired");
      G3C7.innerHTML = `<span>${t1.start}</span><span>${t2.start}</span>`;
      G3C7.dataset.year = String(t1.start); // range 계산용 (1치세 시작)

      // G3C8: 두 끝연도 두 줄
      G3C8.classList.add("g3-paired");
      G3C8.innerHTML = `<span>${t1.end}</span><span>${t2.end}</span>`;
      G3C8.dataset.year = String(t2.end); // range 계산용 (2치세 끝)

      // G3C9: 두 치세년수 두 줄
      const d1 = t1.end - t1.start + 1;
      const d2 = t2.end - t2.start + 1;
      G3C9.classList.add("g3-paired");
      G3C9.innerHTML = `<span>${d1}</span><span>${d2}</span>`;
      G3C9.dataset.pairedStart1 = t1.start;
      G3C9.dataset.pairedEnd1   = t1.end;
      G3C9.dataset.pairedStart2 = t2.start;
      G3C9.dataset.pairedEnd2   = t2.end;

    } else {
      // ── 일반 왕 ──
      G3C5.textContent = item.era;
      adjustG3C5FontSize(item.era);
      G3C6.textContent = item.era.replace(/[가-힣()]/g, "");

      G3C7.classList.remove("g3-paired");
      G3C7.innerHTML = "";
      G3C7.textContent = item.start;
      delete G3C7.dataset.year;

      G3C8.classList.remove("g3-paired");
      G3C8.innerHTML = "";
      G3C8.textContent = item.end;
      delete G3C8.dataset.year;

      G3C9.classList.remove("g3-paired");
      G3C9.innerHTML = "";
      G3C9.textContent = Number(item.end) - Number(item.start) + 1;
      delete G3C9.dataset.pairedStart1;
      delete G3C9.dataset.pairedEnd1;
      delete G3C9.dataset.pairedStart2;
      delete G3C9.dataset.pairedEnd2;
    }

    restoreSelectedCell();
    updateG4ConditionalFormatting();
    applyG6RangeConditionalFormatting();
    updateG6BadgePosition(); /* 먼저 위치 잡기 */
    updateG6bgIndicators();  /* 그 다음 숫자 채우기 */
  }

  buildG2Dropdown("g2Dropdown1", "g2Selected1", "g2List1", g2DataListC1, g2DataListC2, "g2Dropdown2", "g2Selected2", "g2List2");
  buildG2Dropdown("g2Dropdown2", "g2Selected2", "g2List2", g2DataListC2, g2DataListC1, "g2Dropdown1", "g2Selected1", "g2List1");

// ===== G4 조건부 서식 적용 =====
function updateG4ConditionalFormatting() {
  // 문제3 수정: G6 셀이 선택되지 않은 경우 G4 초기화만 하고 종료
  if (selectedCellIndex === null) {
    G4Boxes.forEach((box) => {
      box.style.backgroundColor = "var(--g4-bg)";
      box.style.color = parseInt((box.dataset && box.dataset.year) ? box.dataset.year : box.textContent) < 0
        ? "var(--color-text-red)" : "var(--color-text-default)";
      box.style.fontWeight = "normal";
      box.style.fontSize = "17px";
      box.style.fontFamily = "'D2Coding', monospace";
      box.style.borderColor = "";
      box.style.borderWidth = "";
    });
    return;
  }

  // 쌍 왕 여부 확인
  const isPaired = G3C7.classList.contains("g3-paired");

  G4Boxes.forEach((box) => {
    let val = parseInt((box.dataset && box.dataset.year) ? box.dataset.year : box.textContent) || 0;

    // 음수 처리: 디스플레이 글자색이 빨강이면 음수
    const color = window.getComputedStyle(box).color;
    if (color.includes("255, 0, 0") || color.includes("rgb(255, 0, 0)")) {
      val = -Math.abs(val);
    }

    // 문제2 수정: 쌍 왕은 두 치세 범위를 각각 개별 체크
    let inRange = false;
    if (isPaired) {
      const s1 = parseInt(G3C9.dataset.pairedStart1) || 0;
      const e1 = parseInt(G3C9.dataset.pairedEnd1)   || 0;
      const s2 = parseInt(G3C9.dataset.pairedStart2) || 0;
      const e2 = parseInt(G3C9.dataset.pairedEnd2)   || 0;
      inRange = (val >= s1 && val <= e1) || (val >= s2 && val <= e2);
    } else {
      const startYear = parseInt((G3C7.dataset && G3C7.dataset.year) ? G3C7.dataset.year : G3C7.textContent) || 0;
      const endYear   = parseInt((G3C8.dataset && G3C8.dataset.year) ? G3C8.dataset.year : G3C8.textContent) || 0;
      inRange = val >= startYear && val <= endYear;
    }

    if (inRange) {
      box.style.backgroundColor = "var(--color-bg-black)";
      box.style.color = "var(--color-text-white)";
      box.style.fontWeight = "normal";
      box.style.fontSize = "18.7px";
      box.style.fontFamily = "'D2Coding', monospace";
      box.style.borderColor = "var(--color-bg-black)";
      box.style.borderWidth = "2px";
    } else {
      if (val < 0) {
        box.style.color = "var(--color-text-red)";
      } else {
        box.style.color = "var(--color-text-default)";
      }
      box.style.backgroundColor = "var(--g4-bg)";
      box.style.fontWeight = "normal";
      box.style.fontSize = "17px";
      box.style.fontFamily = "'D2Coding', monospace";
      box.style.borderColor = "";
      box.style.borderWidth = "";
    }
  });
}

// [G6bg] 2. 숫자 스타일 설정 (반투명 노란 배경 + 빨간 글자)
function setG6bgNumStyle(el) {
  el.style.position = "absolute";
  el.style.left = "0";
  el.style.width = "20%";
  el.style.aspectRatio = "1 / 1";
  el.style.zIndex = "100";      
  el.style.display = "flex";
  el.style.alignItems = "flex-start";
  el.style.justifyContent = "center";
  el.style.paddingTop = "0px";
  el.style.fontSize = "10px";
  el.style.lineHeight = "1";
  el.style.fontWeight = "bold";
  el.style.color = "var(--color-text-red)";
  el.style.backgroundColor = "var(--color-bg-badge)"; 
  el.style.pointerEvents = "none";
}

// [G6bg] 3. 간지 인덱스 계산 함수
function getG6bgGanjiIndex(year) {
  let y = parseInt(year);
  if (isNaN(y)) return -1;
  if (y < 0) y += 1;
  let idx = (y - 4) % 60;
  if (idx < 0) idx += 60;
  return idx;
}

// [G6bg] 4. 핵심: 범위 배경색 및 텍스트 조건부 서식 적용 함수

    ranges = [
      { start: parseInt(G3C9.dataset.pairedStart1), end: parseInt(G3C9.dataset.pairedEnd1) },

    ];
  } else {
    const s = parseInt(G3C7.textContent.trim());
    const e = parseInt(G3C8.textContent.trim());
    if (!isNaN(s) && !isNaN(e)) ranges = [{ start: s, end: e }];
  }
  const topOn = window.g6TopBoxEnabled !== false;

  // G6 모든 셀 초기화
  cells.forEach(c => {
    c.style.backgroundColor = "var(--g6-bg)";
    const h = c.querySelector(".hanjaBox");
    const k = c.querySelector(".korBox");
    const t = c.querySelector(".topBox");
    if(h) { h.style.backgroundColor = ""; h.style.color = "var(--color-text-default)"; h.style.fontWeight = "normal"; }
    if(k) { k.style.backgroundColor = ""; k.style.color = "var(--color-text-default)"; k.style.fontWeight = "normal"; }
    if(t) t.style.background = "";
  });

  // 선택된 셀 효과 즉시 복원
  if (selectedCell) {
    const h = selectedCell.querySelector(".hanjaBox");
    const k = selectedCell.querySelector(".korBox");
    if(h) { h.style.backgroundColor = "#FFFF00"; h.style.color = "var(--g6-selected-color)"; h.style.fontWeight = "var(--g6-selected-weight)"; }
    if(k) { k.style.backgroundColor = "#FFFF00"; k.style.color = "var(--g6-selected-color)"; k.style.fontWeight = "var(--g6-selected-weight)"; }
  }

  if (ranges.length === 0) return;

  ranges.forEach(({ start: startYear, end: endYear }) => {
    if (isNaN(startYear) || isNaN(endYear)) return;
    const startIndex = getG6bgGanjiIndex(startYear);
    let duration = (startYear < 0 && endYear > 0) ? (endYear - startYear - 1) : (endYear - startYear);
    let curr = startIndex;
    for (let count = 0; count <= duration && count < 60; count++) {
      if (cells[curr]) {
        const h = cells[curr].querySelector(".hanjaBox");
        const k = cells[curr].querySelector(".korBox");
        const t = cells[curr].querySelector(".topBox");
        if (topOn) {
          if(t) t.style.background = "linear-gradient(to bottom, transparent 0%, #FFD700 50%, transparent 100%)";
        } else {
          if(h) h.style.backgroundColor = "var(--g6-range-bg)";
          if(k) k.style.backgroundColor = "var(--g6-range-bg)";
        }
        if (curr === startIndex && !topOn) {
          const hlVal = getComputedStyle(document.documentElement).getPropertyValue("--g6-startcell-highlight").trim();
          const hlParts = hlVal.split(",");
          const hlOn = hlParts[0].trim() === "1";
          const hlColor = hlParts[1] ? hlParts[1].trim() : "var(--g6-selected-color)";
          if (hlOn) {
            if(h) { h.style.color = hlColor; h.style.fontWeight = "var(--g6-selected-weight)"; }
            if(k) { k.style.color = hlColor; k.style.fontWeight = "var(--g6-selected-weight)"; }
          }
        }
      }
      curr = (curr + 1) % 60;
    }
  });

  // 선택된 G6 셀 스타일 복원
  if (selectedCell) {
    const h = selectedCell.querySelector(".hanjaBox");
    const k = selectedCell.querySelector(".korBox");
    if(h) { h.style.backgroundColor = "#FFFF00"; h.style.color = "var(--g6-selected-color)"; h.style.fontWeight = "var(--g6-selected-weight)"; }
    if(k) { k.style.backgroundColor = "#FFFF00"; k.style.color = "var(--g6-selected-color)"; k.style.fontWeight = "var(--g6-selected-weight)"; }
  }
}

// [G6bg] 5. 숫자 카운트(1~120) 업데이트 함수
function updateG6bgIndicators() {
  const isPaired = G3C7.classList.contains("g3-paired");
  const topOn = window.g6TopBoxEnabled !== false;

  if (isPaired) {
    // ── 쌍 왕 모드: 1치세 → 1.1, 1.2... / 2치세 → 2.1, 2.2...
    const s1 = parseInt(G3C9.dataset.pairedStart1);
    const e1 = parseInt(G3C9.dataset.pairedEnd1);
    const s2 = parseInt(G3C9.dataset.pairedStart2);
    const e2 = parseInt(G3C9.dataset.pairedEnd2);
    if (isNaN(s1) || isNaN(e1) || isNaN(s2) || isNaN(e2)) return;

    const idx1 = getG6bgGanjiIndex(s1);
    const dur1 = e1 - s1;
    const idx2 = getG6bgGanjiIndex(s2);
    const dur2 = e2 - s2;

    if (topOn) {
      cells.forEach((cell, i) => {
        const topBox = cell.querySelector(".topBox");
        if (!topBox) return;
        const pos1 = (i - idx1 + 60) % 60;
        const pos2 = (i - idx2 + 60) % 60;
        const in1 = pos1 <= dur1;
        const in2 = pos2 <= dur2;
        if (in1 && in2) {
          topBox.innerHTML = `<span class='topBox-badge' style='display:inline;font-size:13px;color:#000;line-height:1.2;white-space:nowrap;'>1.${pos1+1}<br>2.${pos2+1}</span>`;
        } else if (in1) {
          topBox.innerHTML = `<span class='topBox-badge' style='display:inline;font-size:13px;color:#000;'>1.${pos1+1}</span>`;
        } else if (in2) {
          topBox.innerHTML = `<span class='topBox-badge' style='display:inline;font-size:13px;color:#000;'>2.${pos2+1}</span>`;
        } else {
          // 범위 밖 — 빈칸 (index 숨김)
          topBox.innerHTML = ``;
        }
      });
      document.querySelectorAll(".hanja-num, .kor-num").forEach(el => {
        el.textContent = "";
        el.style.backgroundColor = "var(--color-bg-transparent)";
      });
    } else {
      const allHanjaNums = document.querySelectorAll(".hanja-num");
      const allKorNums   = document.querySelectorAll(".kor-num");
      allHanjaNums.forEach(el => { el.textContent = ""; el.style.backgroundColor = "var(--color-bg-transparent)"; });
      allKorNums.forEach(el => { el.textContent = ""; el.style.backgroundColor = "var(--color-bg-transparent)"; });

      for (let i = 0; i < 60; i++) {
        const pos1 = (i - idx1 + 60) % 60;
        const pos2 = (i - idx2 + 60) % 60;
        const in1 = pos1 <= dur1;
        const in2 = pos2 <= dur2;
        const hn = allHanjaNums[i];
        const kn = allKorNums[i];
        if (!hn) continue;
        if (in1 && in2) {
          hn.textContent = `1.${pos1+1}`;
          hn.style.backgroundColor = "var(--color-bg-badge)";
          if (kn) { kn.textContent = `2.${pos2+1}`; kn.style.backgroundColor = "var(--color-bg-badge)"; }
        } else if (in1) {
          hn.textContent = `1.${pos1+1}`;
          hn.style.backgroundColor = "var(--color-bg-badge)";
        } else if (in2) {
          hn.textContent = `2.${pos2+1}`;
          hn.style.backgroundColor = "var(--color-bg-badge)";
        }
      }
    }
    return;
  }

  // ── 일반 왕 모드 (기존 로직 유지) ──
  const startYear = parseInt(G3C7.textContent.trim());
  const endYear = parseInt(G3C8.textContent.trim());
  // topOn은 함수 상단에서 이미 선언됨

  // topBox ON일 때: index/badge 전환 방식
  if (topOn) {
    cells.forEach((cell, idx) => {
      const topBox = cell.querySelector(".topBox");
      if (!topBox) return;

      // 왕조 미선택 시: index 표시
      if (isNaN(startYear) || isNaN(endYear)) {
        topBox.innerHTML = `<span class='topBox-index'>${idx}</span>`;
        return;
      }
      // 왕조 선택 시: badge 숫자 계산
      const startIndex = getG6bgGanjiIndex(startYear);
      let duration = (startYear < 0 && endYear > 0) ? (endYear - startYear - 1) : (endYear - startYear);
      // 이 셀의 1순환 위치 (0~59)
      let pos = (idx - startIndex + 60) % 60;
      const num1 = (pos <= duration && pos <= 59) ? pos + 1 : null;        // 1~60
      const num2 = (pos + 60 <= duration && pos + 60 <= 119) ? pos + 61 : null; // 61~120

      if (num1 !== null && num2 !== null) {
        // 두 번 순환: "1/61" 형식 (한 줄)
        topBox.innerHTML = `<span class='topBox-badge' style='display:inline;font-size:13px;color:#000000;line-height:1.2;white-space:nowrap;'>${num1}/${num2}</span>`;
      } else if (num2 !== null) {
        // 2순환만: "1/61" 형식 (한 줄)
        topBox.innerHTML = `<span class='topBox-badge' style='display:inline;font-size:13px;color:#000000;line-height:1.2;white-space:nowrap;'>${num2 - 60}/${num2}</span>`;
      } else if (num1 !== null) {
        // 1순환만
        topBox.innerHTML = `<span class='topBox-badge' style='display:inline;'>${num1}</span>`;
      } else {
        // 범위 밖 — 빈칸
        topBox.innerHTML = ``;
      }
    });

    // 기존 절대위치 배지 숨김
    document.querySelectorAll(".hanja-num, .kor-num").forEach(el => {
      el.textContent = "";
      el.style.backgroundColor = "var(--color-bg-transparent)";
    });

  } else {
    // topBox OFF: 기존 배지 방식 유지
    const allHanjaNums = document.querySelectorAll(".hanja-num");
    const allKorNums = document.querySelectorAll(".kor-num");

    allHanjaNums.forEach(el => { el.textContent = ""; el.style.backgroundColor = "var(--color-bg-transparent)"; });
    allKorNums.forEach(el => { el.textContent = ""; el.style.backgroundColor = "var(--color-bg-transparent)"; });

    if (isNaN(startYear) || isNaN(endYear)) return;

    const startIndex = getG6bgGanjiIndex(startYear);
    let duration = (startYear < 0 && endYear > 0) ? (endYear - startYear - 1) : (endYear - startYear);
    const isL2 = window.g6BadgePos === 2; /* 치세L2 여부 */

    if (isL2) {
      // 치세L2: hanja-num 에 "1/61" 형식으로 표시, kor-num 미사용
      for (let i = 0; i < 60; i++) {
        const pos = (i - startIndex + 60) % 60;
        const num1 = (pos <= duration) ? pos + 1 : null;              // 1~60
        const num2 = (pos + 60 <= duration) ? pos + 61 : null;        // 61~120
        const target = allHanjaNums[i];
        if (!target) continue;
        if (num1 !== null && num2 !== null) {
          target.textContent = `${num1}/${num2}`;
          target.style.backgroundColor = "var(--color-bg-badge)";
          target.style.justifyContent = "center";
          target.style.width = "auto";
          target.style.aspectRatio = "unset";
          target.style.whiteSpace = "nowrap";
        } else if (num1 !== null) {
          target.textContent = num1;
          target.style.backgroundColor = "var(--color-bg-badge)";
          target.style.justifyContent = "center";
          target.style.width = "20%";
          target.style.aspectRatio = "1 / 1";
          target.style.whiteSpace = "nowrap";
        } else {
          target.textContent = "";
          target.style.backgroundColor = "var(--color-bg-transparent)";
          target.style.justifyContent = "center";
          target.style.width = "20%";
          target.style.aspectRatio = "1 / 1";
        }
      }
    } else {
      // 치세L1: 기존 방식 유지
      let currentIndex = startIndex;
      let count = 1;
      const maxLimit = 120;
      while (count <= duration + 1 && count <= maxLimit) {
        let target = (count <= 60) ? allHanjaNums[currentIndex] : allKorNums[currentIndex];
        if (target) {
          target.textContent = count;
          target.style.backgroundColor = "var(--color-bg-badge)";
        }
        currentIndex = (currentIndex + 1) % 60;
        count++;
      }
    }
  }
}

// ===== G1C2 툴팁 ON/OFF 토글 =====
const G1C2 = document.getElementById("G1C2");
// ===== G1C1 marquee 동적 처리 =====
(function() {
  const container = document.getElementById("G1C1");
  if (!container) return;
  const text = "육십갑자";
  let raf = null;
  let active = false;
  let a, b;

  function startMarquee() {
    if (active) return;
    active = true;
    container.style.position = "relative";
    container.textContent = "";

    a = document.createElement("span");
    b = document.createElement("span");
    [a, b].forEach(s => {
      s.textContent = text;
      s.style.cssText = "position:absolute; white-space:nowrap; left:0; top:50%; transform:translateY(-50%);";
      container.appendChild(s);
    });

    const W = container.offsetWidth;
    let x1 = 0;
    let x2 = W; // b는 오른쪽에서 시작
    const speed = 30; // px/s
    let last = null;

    function tick(ts) {
      if (!active) return;
      if (last === null) last = ts;
      const dt = (ts - last) / 1000;
      last = ts;

      x1 -= speed * dt;
      x2 -= speed * dt;

      // 화면 밖으로 나가면 반대쪽으로 순환
      const tw = a.offsetWidth;
      if (x1 + tw < 0) x1 = x2 + tw;
      if (x2 + tw < 0) x2 = x1 + tw;

      a.style.left = x1 + "px";
      b.style.left = x2 + "px";

      raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
  }

  function stopMarquee() {
    if (!active) return;
    active = false;
    if (raf) cancelAnimationFrame(raf);
    container.textContent = text;
    container.style.position = "";
  }

  // 클릭으로 marquee 토글
  let clickActive = false;
  container.addEventListener("click", function() {
    clickActive = !clickActive;
    if (clickActive) {
      startMarquee();
    } else {
      stopMarquee();
    }
  });
})();

// ===== 툴팁 사이즈 설정 =====
window.g6TooltipSize = "M"; // 기본값: M
const tooltipSizeMap = { S: 9, M: 11, L: 13 }; // S=현재, M=+2, L=+4

function applyTooltipSize(size) {
  window.g6TooltipSize = size;
  G1C2.textContent = window.g6TooltipEnabled
    ? `툴팁(${size})`  /* ON: 사이즈 표시 */

}

function showTooltipSizeMenu(e) {
  // 기존 메뉴 제거
  const existing = document.getElementById("tooltip-size-menu");
  if (existing) existing.remove();

  const menu = document.createElement("div");
  menu.id = "tooltip-size-menu";
  menu.style.cssText = `
    position: fixed;
    background: rgba(0,0,0,0.9);
    border-radius: 3px;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.3);
    z-index: 99999;
    font-family: 'D2Coding', monospace;
    font-size: 11px;
    padding: 4px 0;
    color: #fff;
  `;

  // 타이틀
  const title = document.createElement("div");
  title.textContent = "툴팁 크기";
  title.style.cssText = "padding:3px 12px 4px; font-weight:bold; background:rgba(255,255,255,0.1); border-bottom:1px solid rgba(255,255,255,0.2); font-size:11px; text-align:center; color:#fff;";
  menu.appendChild(title);

  ["S", "M", "L"].forEach(size => {
    const fs = tooltipSizeMap[size];
    const item = document.createElement("div");
    const isSelected = window.g6TooltipSize === size;
    item.style.cssText = `padding:4px 16px; cursor:pointer; font-size:${fs}px; color:#fff; ${isSelected ? "background:rgba(255,255,255,0.15);font-weight:bold;" : ""}`;
    item.textContent = `${size}  (${fs}px)`;
    item.addEventListener("mouseenter", () => item.style.background = "rgba(255,255,255,0.2)");
    item.addEventListener("mouseleave", () => item.style.background = isSelected ? "rgba(255,255,255,0.15)" : "transparent");
    item.addEventListener("click", () => {
      applyTooltipSize(size);
      menu.remove();
    });
    menu.appendChild(item);
  });

  // 위치: 버튼 아래
  const rect = G1C2.getBoundingClientRect();
  menu.style.left = rect.left + "px";
  menu.style.top  = rect.bottom + "px";
  document.body.appendChild(menu);

  // 외부 클릭 시 닫기
  setTimeout(() => {
    document.addEventListener("mousedown", function handler(ev) {
      if (!menu.contains(ev.target)) {
        menu.remove();
        document.removeEventListener("mousedown", handler);
      }
    });
  }, 0);
}

G1C2.addEventListener("mousedown", function(e) {

function updateG6BadgePosition() {
  const topOn    = window.g6TopBoxEnabled !== false; // 기본 true
  const topH     = topOn ? 28 : 0;   /* topBox 높이 (OFF면 0) */
  const hanjaH   = 29;                /* hanjaBox 높이 */
  const cellHeight = parseFloat(getComputedStyle(document.documentElement)
                     .getPropertyValue("--g6-cell-height")) || 86;
  const badgeSize  = cellHeight * 0.2;

  const boxH = 27; /* hanjaBox 고정 높이 */
  const hanjaNumEl = document.querySelector(".hanja-num");
  const badgeFontSize = parseFloat(hanjaNumEl ? hanjaNumEl.style.fontSize : "10") || 10;
  const cs = getComputedStyle(document.documentElement);
  const hanjaLineWidth = parseFloat(cs.getPropertyValue("--g6-hanjaline-width")) || 1; /* 회색 라인 두께 */
  const autoHanjaOffset = -(badgeFontSize / 2) - hanjaLineWidth; /* 글자 중앙을 회색라인에 맞추는 자동 계산값 */
  const l2HanjaOffset = autoHanjaOffset + (parseFloat(cs.getPropertyValue("--g6bg-l2-hanja-top-offset")) || 0);
  const l2KorOffset   = parseFloat(cs.getPropertyValue("--g6bg-l2-kor-top-offset"))   || 0;

  document.querySelectorAll(".hanja-num").forEach(el => {
    if (window.g6BadgePos === 1) {
      el.style.top    = topH + "px"; /* topBox 아래 = hanjaBox 시작 */
      el.style.left   = "0";
      el.style.right  = "";
      el.style.bottom = "";
      el.style.alignItems = "flex-start";
    } else {
      el.style.top    = (topH + boxH + l2HanjaOffset) + "px"; /* 회색 라인 위치(topH+boxH) + --g6bg-l2-hanja-top-offset 로 조정 */
      el.style.left   = "1px";
      el.style.right  = "";
      el.style.bottom = "";
      el.style.alignItems = "center"; /* 글자 중앙을 회색라인에 정렬 */
    }
  });

  const korNumTopPos1 = (topH + boxH) + "px";

  document.querySelectorAll(".kor-num").forEach(el => {
    const cellEl   = el.closest(".cell");
    const hanjaEl  = cellEl ? cellEl.querySelector(".hanjaBox") : null;
    if (!cellEl || !hanjaEl) return;
    const cellRect  = cellEl.getBoundingClientRect();
    const hanjaRect = hanjaEl.getBoundingClientRect();
    const lineY     = hanjaRect.bottom - cellRect.top; /* 경계선 위치(셀 기준) */
    const badgeH    = el.getBoundingClientRect().height || 10.16;
    if (window.g6BadgePos === 1) {
      /* 위치1: korBox 좌측 상단 — 회색라인 중앙 정렬 (치세L2 첫번째와 동일) */
      el.style.top    = (topH + boxH + autoHanjaOffset) + "px";
      el.style.left   = "0";
      el.style.right  = "";
      el.style.bottom = "";
      el.style.alignItems = "center";
      el.style.display = "flex"; /* L1: 표시 */
    } else {
      /* 위치2: 치세L2 — kor-num 숨김 (hanja-num에 1/61 형식으로 통합) */
      el.style.display = "none";
    }
  });
}

function getG7GanjiText(year) {
  let y = year <= 0 ? year + 1 : year;
  const ganIdx  = ((y - 4) % 10 + 10) % 10;
  const jibiIdx = ((y - 4) % 12 + 12) % 12;
  const han  = gans[ganIdx]     + jibis[jibiIdx];
  const kor  = gans_kor[ganIdx] + jibis_kor[jibiIdx];
  if (window.g7MMode) {
    // M모드: 漢→한자 2자만, 한→한글 2자만
    return window.g7MModeChar === "漢" ? han : kor;
  }
  switch (window.g7DisplayMode) {
    case 0: return han + kor;
    case 1: return kor + han;
    case 2: return han;
    case 3: return kor;
  }
}

function updateG7R3C1() {
  if (!G7R3C1El) return;
  if (window.g7MMode) {

  } else {

function updateG7OddCellFontSize() {
  const g6FontSize = getComputedStyle(document.documentElement).getPropertyValue("--g6-font-size").trim();

  /* M모드: 2자(한자 or 한글)만 → G6 폰트 크기
     D모드: 1자(漢/한) → G6, 2자(漢한/한漢) → 10px, 기타 → 8px */
  let fontSize;
  if (window.g7MMode) {
    fontSize = g6FontSize;  // M모드는 항상 2자이므로 G6 폰트
  } else if (charLen <= 1) {
    fontSize = g6FontSize;
  } else if (charLen === 2) {
    fontSize = "10px";
  } else {
    fontSize = "8px";
  }

  G7OddCellIds.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.fontSize = fontSize;
    el.style.fontWeight = "normal";
  });
}

// ===== G7 간지 변환 유틸 =====

function yearToGanji(year) {
  let y = year <= 0 ? year + 1 : year; // 천문 연도 변환
  const ganIdx  = ((y - 4) % 10 + 10) % 10;
  const jibiIdx = ((y - 4) % 12 + 12) % 12;
  return gans_kor[ganIdx] + jibis_kor[jibiIdx] + gans[ganIdx] + jibis[jibiIdx];
}

function yearToGanjiShort(year) {
  let y = year <= 0 ? year + 1 : year;
  const ganIdx  = ((y - 4) % 10 + 10) % 10;
  const jibiIdx = ((y - 4) % 12 + 12) % 12;
  const han = gans[ganIdx]     + jibis[jibiIdx];
  const kor = gans_kor[ganIdx] + jibis_kor[jibiIdx];
  // 모바일(.short)도 현재 표기방식 모드를 반영
  if (window.g7MMode) {
    return window.g7MModeChar === "漢" ? han : kor;
  }
  switch (window.g7DisplayMode) {
    case 0: return han + kor; // 漢한
    case 1: return kor + han; // 한漢
    case 2: return han;       // 漢
    case 3: return kor;       // 한
    default: return kor;
  }
}

function updateG7Row(pairs, years) {
  pairs.forEach(([ganjiId, yearId], i) => {
    const year = years[i];
    const ganjiEl = document.getElementById(ganjiId);
    const yearEl  = document.getElementById(yearId);
    if (year != null) {
      const full  = getG7GanjiText ? getG7GanjiText(year) : yearToGanji(year);
      const short = yearToGanjiShort(year);
      if (ganjiEl) ganjiEl.innerHTML = `<span class="full">${full}</span><span class="short">${short}</span>`;
      if (yearEl) {
        yearEl.textContent = year <= 0 ? "BC" + Math.abs(year) : year;
        yearEl.style.color = "var(--g7-color-input)"; // 파랑 유지
      }
    } else {
      if (ganjiEl) ganjiEl.innerHTML = "";
      if (yearEl)  yearEl.textContent = "";
    }
  });
}

const G7R3CalcPairs = [
  { r1Id:"G7R1C2", r2Id:"G7R2C2", r3Id:"G7R3C2" },
  { r1Id:"G7R1C4", r2Id:"G7R2C4", r3Id:"G7R3C4" },
  { r1Id:"G7R1C6", r2Id:"G7R2C6", r3Id:"G7R3C6" },
];

function updateG7R3(r1Id, r2Id, r3Id) {
  const r1El = document.getElementById(r1Id);
  const r2El = document.getElementById(r2Id);
  const v1 = parseInt(r1El ? r1El.textContent.trim() : "");
  const v2 = parseInt(r2El ? r2El.textContent.trim() : "");
  const r3El = document.getElementById(r3Id);
  if (!r3El) return;
  if (!isNaN(v1) && !isNaN(v2)) {
    // 향년·수 모드: +1 / 만 모드: +0
    const offset = g7C8HyanMode ? 1 : 0;
    r3El.textContent = Math.abs(v1 - v2) + offset;
  } else {
    r3El.textContent = "";
  }
}

// 마지막으로 수정된 두 셀을 기준으로 나머지 하나를 자동계산
// lastEditedC8: 최근 수정 순서 추적 (최대 2개)
let lastEditedC8 = []; // e.g. ["R1","R2"] → R3 자동계산

function setC8GanjiCell(yearValue, ganjiElId) {
  const ganjiEl = document.getElementById(ganjiElId);

function setC8Value(rowKey, value) {
  const idMap = { R1: "G7R1C8", R2: "G7R2C8", R3: "G7R3C8" };
  const ganjiMap = { R1: "G7R1C7", R2: null, R3: "G7R3C7" };
  const el = document.getElementById(idMap[rowKey]);
  if (!el) return;
  el.textContent = isNaN(value) ? "" : value;
  el.style.color = "var(--g7-color-input)"; // 자동계산 후에도 파랑 유지
  if (ganjiMap[rowKey]) setC8GanjiCell(value, ganjiMap[rowKey]);
}

function getC8Value(rowKey) {
  const idMap = { R1: "G7R1C8", R2: "G7R2C8", R3: "G7R3C8" };
  return parseInt(document.getElementById(idMap[rowKey])?.textContent.trim() || "");
}

function recalcC8(editedRow) {
  // 최근 수정 목록 갱신 (중복 제거 후 앞에 추가, 최대 2개 유지)
  lastEditedC8 = [editedRow, ...lastEditedC8.filter(r => r !== editedRow)].slice(0, 2);

  if (lastEditedC8.length < 2) return; // 2개 이상 입력돼야 계산

  const [a, b] = lastEditedC8;
  const remaining = ["R1","R2","R3"].find(r => r !== a && r !== b);
  const va = getC8Value(a);
  const vb = getC8Value(b);

  if (isNaN(va) || isNaN(vb)) return; // 두 값 중 하나라도 없으면 계산 안 함

  // 수식: 생년(R1) + 향년(R2) - offset = 졸년(R3)
  // offset: 향년모드=1, 령모드=0
  const offset = g7C8HyanMode ? 1 : 0;
  const r1 = a === "R1" ? va : b === "R1" ? vb : NaN;
  const r2 = a === "R2" ? va : b === "R2" ? vb : NaN;
  const r3 = a === "R3" ? va : b === "R3" ? vb : NaN;

  let result;
  if (remaining === "R3") result = r1 + r2 - offset;  // 졸년 = 생년 + 향년 - offset
  if (remaining === "R2") result = r3 - r1 + offset;  // 향년 = 졸년 - 생년 + offset
  if (remaining === "R1") result = r3 - r2 + offset;  // 생년 = 졸년 - 향년 + offset

  setC8Value(remaining, result);
}

// 공통 이벤트 등록 함수
function attachC8Events(rowKey, maxVal) {
  const idMap = { R1: "G7R1C8", R2: "G7R2C8", R3: "G7R3C8" };
  const el = document.getElementById(idMap[rowKey]);
  if (!el) return;

  el.addEventListener("focus", function() {
    const range = document.createRange();
    range.selectNodeContents(this);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  });

  el.addEventListener("input", function() {
    let val = parseInt(this.textContent.trim());
    if (maxVal && !isNaN(val) && val > maxVal) {
      this.textContent = String(maxVal);
      const range = document.createRange();
      range.selectNodeContents(this);
      range.collapse(false);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      val = maxVal;
    }
    // 생년/졸년 간지 실시간 업데이트
    if (rowKey === "R1") setC8GanjiCell(val, "G7R1C7");
    if (rowKey === "R3") setC8GanjiCell(val, "G7R3C7");
    recalcC8(rowKey);
  });

  el.addEventListener("keydown", function(e) {
    if (e.key === "Enter" || e.key === "Tab") {
      e.preventDefault();
      const idx = allG7YearIds.indexOf(idMap[rowKey]);
      const nextIdx = e.shiftKey
        ? (idx - 1 + allG7YearIds.length) % allG7YearIds.length
        : (idx + 1) % allG7YearIds.length;
      document.getElementById(allG7YearIds[nextIdx])?.focus();
    }
    if (e.key === "Escape") {
      e.preventDefault();
      window.getSelection().removeAllRanges();
      this.blur();
    }
  });

  el.addEventListener("blur", function() {
    const val = parseInt(this.textContent.trim());
    if (isNaN(val)) {
      this.innerHTML = "<br>";
      if (rowKey === "R1") setC8GanjiCell(NaN, "G7R1C7");
      if (rowKey === "R3") setC8GanjiCell(NaN, "G7R3C7");
    }
  });
}

// ===== G7 C9/C10 단기↔서기 자동 변환 =====
// G7R1C10: 단기(≥2334) 또는 서기(<2334) 입력 → G7R1C9에 반대 결과 표시
// G7R2C9, G7R2C10: 사용하지 않음 (빈 셀)

function updateG7Conv10() {
  const inputEl   = document.getElementById("G7R1C10");
  const displayEl = document.getElementById("G7R1C9");
  if (!inputEl || !displayEl) return;
  const val = parseInt(inputEl.textContent.trim());
  if (isNaN(val)) {
    displayEl.textContent = "";
    return;
  }
  if (val >= 2334) {
    // 단기 입력 → 서기 표시
    displayEl.textContent = val - 2333;
  } else {
    // 서기 입력 → 단기 표시
    displayEl.textContent = val + 2333;
  }
}

// ===== G1C10 사용폰트 디버그 패널 토글 =====
(function() {
  const btn = document.getElementById("G1C10");
  if (!btn) return;

  // 디폴트 ON
  window.g6DebugEnabled = true;
  btn.style.color = "var(--g1-color)";

  function fallbackCopy(text, b) {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.cssText = "position:fixed;opacity:0;";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand("copy"); b.textContent = "✓완료"; }
    catch(e) { b.textContent = "실패"; }
    document.body.removeChild(ta);
    setTimeout(() => b.textContent = "복사", 1500);
  }

  // 디버그 패널 위치/크기를 visualViewport 기준으로 갱신
  function updateDbgPosition() {
    const dbg = document.getElementById("_dbg");
    if (!dbg) return;
    const vv = window.visualViewport;
    if (vv) {
      dbg.style.left   = vv.offsetLeft + "px";
      dbg.style.width  = vv.width + "px";
      dbg.style.bottom = "0px";
      // 작은 화면(폰/줌) 대응: 480px 이하면 폰트/패딩 축소
      const small = vv.width <= 480;
      dbg.style.fontSize  = small ? "9px"  : "11px";
      dbg.style.padding   = small ? "3px 4px" : "4px 6px";
    } else {
      dbg.style.left  = "0px";
      dbg.style.width = "100%";
    }
  }

  window.showDebug = function(msg) {
    const dbgEl = document.getElementById("_dbg");
    if (!window.g6DebugEnabled) {
      if (dbgEl) dbgEl.style.display = "none";
      return;
    }
    let dbg = dbgEl;
    if (!dbg) {
      dbg = document.createElement("div");
      dbg.id = "_dbg";
      dbg.style.cssText = "position:fixed;bottom:0;left:0;width:100%;background:rgba(0,0,0,0.9);color:#fff;font-size:11px;padding:4px 6px;z-index:99999;line-height:1.6;display:flex;align-items:center;gap:6px;flex-wrap:nowrap;box-sizing:border-box;overflow:hidden;";
      const txt = document.createElement("span");
      txt.id = "_dbg_txt";
      txt.style.cssText = "flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;min-width:0;";
      dbg.appendChild(txt);
      const b = document.createElement("button");
      b.textContent = "복사";
      b.style.cssText = "flex-shrink:0;padding:2px 8px;font-size:11px;cursor:pointer;background:#fff;color:#000;border:1px solid #aaa;border-radius:3px;";
      b.addEventListener("click", () => {
        const text = txt.innerText;
        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text)
            .then(() => { b.textContent = "✓완료"; setTimeout(() => b.textContent = "복사", 1500); })
            .catch(() => fallbackCopy(text, b));
        } else {
          fallbackCopy(text, b);
        }
      });
      dbg.appendChild(b);
      document.body.appendChild(dbg);
    }
    dbg.style.display = "flex";
    document.getElementById("_dbg_txt").innerHTML = msg;
    updateDbgPosition();
  };

  // 디버그 메시지 생성 함수 (폰트 + 화면 크기 통합)
  function getFirstFont(cssVar) {
    const val = getComputedStyle(document.documentElement).getPropertyValue(cssVar).trim();
    return val.split(",")[0].trim().replace(/['"]/g, "");
  }

  function buildDebugMsg() {
    const font1 = getFirstFont("--g3-font-family");       /* 기본 폰트 */
    const font2 = getFirstFont("--g2-option-font-family"); /* 왕 목록 폰트 */
    const w = window.innerWidth;
    const h = window.innerHeight;
    const g6El = document.getElementById("ganjiGrid");
    const g6H = g6El ? g6El.getBoundingClientRect().height : 0;
    const g6W = g6El ? g6El.getBoundingClientRect().width : 0;
    return `<b>폰트</b> &nbsp;<b><a href="https://github.com/naver/d2codingfont/releases/download/VER1.3.2/D2Coding-Ver1.3.2-20180524.zip" style="color:#4fc3f7;text-decoration:underline;" target="_blank">${font1}</a></b> &nbsp;|&nbsp; <b>${font2}</b>`
         + `<br><b>화면</b> &nbsp;<b style="color:#4fc3f7;">W${w} H${h}</b>`
         + `&nbsp;&nbsp;|&nbsp;&nbsp;<b>G6</b> &nbsp;<b style="color:#a5d6a7;">W${Math.round(g6W)} H${Math.round(g6H)}</b>`;
  }

  // 초기 표시
  showDebug(buildDebugMsg());

  // 화면 크기 변경 시 실시간 업데이트 (visualViewport 줌/스크롤 포함)
  function onViewportChange() {
    if (window.g6DebugEnabled) showDebug(buildDebugMsg());
    else updateDbgPosition();
  }
  window.addEventListener("resize", onViewportChange);
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", onViewportChange);
    window.visualViewport.addEventListener("scroll", onViewportChange);
  }

  // 토글
  btn.addEventListener("click", function() {
    window.g6DebugEnabled = !window.g6DebugEnabled;
    btn.style.color = window.g6DebugEnabled ? "var(--g1-color)" : "var(--g1-color-inactive)";
    showDebug(buildDebugMsg());
  });
})();

    }
  });
});
